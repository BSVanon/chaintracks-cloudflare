name = "chaintracks-cloudflare"
main = "build/worker/shim.mjs"
compatibility_date = "2024-01-01"

# Replace with your Cloudflare account ID (Workers & Pages → Account details).
account_id = ""

[vars]
CHAIN = "main"
WHATSONCHAIN_API_KEY = ""
# Optional: base URL of an upstream chaintracks instance used for fast
# catch-up (bulk getHeaders). Leave empty to sync directly from WhatsOnChain.
UPSTREAM_CHAINTRACKS_URL = ""

# REQUIRED for the /admin/* surface (fail-closed: admin routes answer 503
# until this secret exists). Set with: npx wrangler secret put ADMIN_TOKEN
# All /admin/* calls then need:  Authorization: Bearer <token>
# (Do NOT put the token here — use the secret store.)

[build]
# Pin worker-build to the worker-crate/wasm-bindgen pairing this repo is
# tested against (mismatched trios fail with "different bindgen format").
command = "cargo install -q worker-build@0.7.5 && worker-build --release"

[[d1_databases]]
binding = "DB"
database_name = "chaintracks-cloudflare"
# Create with: npx wrangler d1 create chaintracks-cloudflare
# Then paste the returned database_id here.
database_id = ""

[[r2_buckets]]
binding = "BULK_HEADERS"
bucket_name = "chaintracks-cloudflare-headers"
# Create with: npx wrangler r2 bucket create chaintracks-cloudflare-headers

[triggers]
crons = ["* * * * *"]
